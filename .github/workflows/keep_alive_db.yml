name: Keep Alive Database
on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Ping Supabase database
        run: |
          psql "${{ secrets.DB_DIRECT_URL }}" -c "SELECT 1;"